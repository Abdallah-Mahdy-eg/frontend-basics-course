<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Frontend Course Dashboard</title>

<style>
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: Arial, sans-serif;
    }

    body {
        background: #f1f5f9;
        color: #1e293b;
    }

    /* Header */
    .header {
        background: linear-gradient(to right, #0f172a, #1e293b);
        color: white;
        padding: 30px;
        text-align: center;
    }

    .header h1 {
        margin-bottom: 8px;
    }

    /* Container */
    .container {
        padding: 30px;
    }

    /* Sections title */
    .section-title {
        margin: 20px 0 10px;
        font-size: 20px;
        border-left: 5px solid #0ea5e9;
        padding-left: 10px;
    }

    /* Grid */
    .grid {
        overflow: hidden;
    }

    .card {
        width: 30%;
        float: left;
        margin: 1.66%;
        background: white;
        padding: 20px;
        border-radius: 12px;
        border: 1px solid #e2e8f0;
        transition: 0.3s;
    }

    .card:hover {
        transform: translateY(-5px);
        box-shadow: 0 10px 20px rgba(0,0,0,0.08);
    }

    .card h3 {
        margin-bottom: 10px;
    }

    .card p {
        color: #64748b;
        font-size: 14px;
        margin-bottom: 15px;
    }

    .card a {
        display: inline-block;
        padding: 8px 12px;
        background: #0ea5e9;
        color: white;
        text-decoration: none;
        border-radius: 6px;
        font-size: 14px;
    }

    .card a:hover {
        background: #0284c7;
    }

    .clear {
        clear: both;
    }

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <h1>Frontend Basics Course</h1>
    <p>Dashboard - Weeks & Assignments</p>
</div>

<div class="container">

    <!-- WEEKS -->

    <div class="grid">
